<title>AMSelect — LPBF Machine &amp; Powder Advisor</title>
<style>
  :root {
    --bg: #f2f4f6;
    --panel: #ffffff;
    --side: #1a2430;
    --side-ink: #aebbc9;
    --side-hi: #ffffff;
    --ink: #1b2531;
    --muted: #62717f;
    --faint: #93a1ae;
    --line: #dde3e9;
    --ember: #b8531a;
    --ember-soft: #f9ece2;
    --ember-line: #ecd3bd;
    --ok: #2f7d4f;
    --ok-soft: #e7f2eb;
    --warn: #a97b13;
    --warn-soft: #f9f1dc;
    --mono: Consolas, "Cascadia Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 14.5px/1.5 "Segoe UI", system-ui, sans-serif;
    display: grid;
    grid-template-columns: 218px 1fr;
  }
  button { font: inherit; cursor: pointer; }

  /* ================= sidebar ================= */
  nav {
    background: var(--side);
    color: var(--side-ink);
    padding: 20px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky; top: 0; height: 100vh;
  }
  .logo { display: flex; align-items: center; gap: 10px; padding: 2px 10px 18px; }
  .logo svg { flex: none; }
  .logo b { color: var(--side-hi); font-size: 16px; letter-spacing: 0.02em; }
  .logo small { display: block; font-size: 10.5px; color: var(--side-ink); letter-spacing: 0.1em; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    background: none; border: 0; text-align: left;
    color: var(--side-ink);
    padding: 9px 10px; border-radius: 6px; font-size: 14px;
    width: 100%;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--side-hi); }
  .nav-item.active { background: rgba(255,255,255,0.10); color: var(--side-hi); font-weight: 600; }
  .nav-item .badge {
    margin-left: auto; font-family: var(--mono); font-size: 11px;
    background: var(--ember); color: #fff; border-radius: 10px; padding: 0 7px; line-height: 17px;
  }
  .nav-item svg { flex: none; opacity: 0.85; }
  .nav-foot { margin-top: auto; font-size: 11.5px; color: #6d7c8a; padding: 0 10px; line-height: 1.45; }

  /* ================= main ================= */
  main { min-width: 0; padding: 26px 32px 70px; }
  .topline { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  h1 { font-size: 20px; margin: 0; font-weight: 650; }
  .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 22px; max-width: 68ch; }

  /* ---------- wizard ---------- */
  .steps { display: flex; gap: 0; margin-bottom: 22px; border-bottom: 1px solid var(--line); }
  .step {
    background: none; border: 0; border-bottom: 2px solid transparent;
    padding: 8px 16px 10px; color: var(--muted); font-size: 13.5px;
    display: flex; align-items: center; gap: 8px;
  }
  .step .n {
    font-family: var(--mono); font-size: 11px; width: 18px; height: 18px; line-height: 18px;
    border-radius: 50%; background: var(--line); color: var(--muted); text-align: center;
  }
  .step.active { color: var(--ink); font-weight: 600; border-bottom-color: var(--ember); }
  .step.active .n { background: var(--ember); color: #fff; }
  .step.done .n { background: var(--ok); color: #fff; }
  .step:disabled { cursor: default; }

  .cardrow { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
  .pick {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 16px; text-align: left; transition: border-color 0.12s;
  }
  .pick:hover { border-color: var(--faint); }
  .pick.sel { border-color: var(--ember); background: var(--ember-soft); }
  .pick b { display: block; font-size: 14.5px; margin-bottom: 3px; }
  .pick span { font-size: 12.5px; color: var(--muted); }
  .pick.sel span { color: #8a5a35; }

  .togglewrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .toggle {
    border: 1px solid var(--line); background: var(--panel); border-radius: 20px;
    padding: 6px 15px; font-size: 13.5px; color: var(--ink);
  }
  .toggle.sel { background: var(--ember); border-color: var(--ember); color: #fff; font-weight: 600; }

  .formgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 280px)); gap: 16px; }
  .field label { display: block; font-size: 11.5px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); font-weight: 650; margin-bottom: 6px; }
  .field select, .field input, .field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--panel); font: inherit; color: var(--ink);
  }
  .field textarea { resize: vertical; }
  .field input:focus-visible, .field textarea:focus-visible, .field select:focus-visible { outline: 2px solid var(--ember); outline-offset: 1px; }
  .rfqbox {
    width: 100%; min-height: 280px; resize: vertical;
    font: 12.5px/1.6 var(--mono); padding: 14px 16px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel); color: var(--ink); white-space: pre-wrap;
  }
  .wizfoot { margin-top: 24px; display: flex; gap: 10px; }
  .btn {
    border: 1px solid var(--line); background: var(--panel); color: var(--ink);
    border-radius: 6px; padding: 9px 18px; font-size: 14px;
  }
  .btn:hover { border-color: var(--faint); }
  .btn.primary { background: var(--ember); border-color: var(--ember); color: #fff; font-weight: 600; }
  .btn.primary:hover { background: #a2470f; }
  .btn:focus-visible { outline: 2px solid var(--ember); outline-offset: 2px; }

  /* ---------- results / machine cards ---------- */
  .mcard {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 16px 20px; margin-bottom: 12px;
    display: grid; grid-template-columns: 52px 1fr auto; gap: 4px 16px; align-items: start;
  }
  .rank {
    font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--ember);
    background: var(--ember-soft); border-radius: 8px; width: 52px; height: 52px;
    display: grid; place-items: center;
  }
  .rank.plain { background: #eef1f4; color: var(--muted); font-size: 15px; }
  .mname { font-size: 15.5px; font-weight: 650; }
  .mmaker { color: var(--muted); font-weight: 400; }
  .mclass {
    font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase;
    padding: 1px 8px; border-radius: 3px; background: #eef1f4; color: var(--muted); margin-left: 6px; vertical-align: 1px;
  }
  .specrow { display: flex; flex-wrap: wrap; gap: 3px 20px; color: var(--muted); font-size: 13px; margin-top: 4px; }
  .specrow b { color: var(--ink); font-family: var(--mono); font-size: 12.5px; font-weight: 600; }
  .mwhy { font-size: 13px; color: var(--muted); margin-top: 6px; max-width: 72ch; }
  .chips { grid-column: 2 / -1; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .chip {
    font-size: 12px; padding: 2px 10px; border-radius: 20px;
    background: var(--ok-soft); color: var(--ok); border: 1px solid #cfe4d6;
  }
  .chip.na { background: #f1f3f5; color: var(--faint); border-color: var(--line); }
  .mside { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .score { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--ember); line-height: 1; }
  .score small { font-size: 11px; color: var(--faint); font-weight: 400; display: block; margin-top: 2px; letter-spacing: 0.05em; }
  .mbtns { display: flex; gap: 6px; }
  .mini {
    font-size: 12.5px; padding: 5px 12px; border-radius: 5px;
    border: 1px solid var(--line); background: var(--panel); color: var(--ink);
  }
  .mini:hover { border-color: var(--faint); }
  .mini.on { background: var(--side); border-color: var(--side); color: #fff; }
  .price { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .empty { color: var(--muted); padding: 22px; background: var(--panel); border: 1px dashed var(--line); border-radius: 8px; }

  /* ---------- powder cards ---------- */
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(265px, 1fr)); gap: 12px; }
  .pcard { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 15px 17px; }
  .pcard h3 { margin: 0; font-size: 15px; }
  .pfam { font-size: 12px; color: var(--faint); margin-bottom: 8px; }
  .pdata { font-size: 12.5px; color: var(--muted); }
  .pdata div { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px dotted var(--line); }
  .pdata div:last-child { border-bottom: 0; }
  .pdata b { font-family: var(--mono); color: var(--ink); font-weight: 600; font-size: 12px; }
  .tagrow { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0 0; }
  .tag { font-size: 11px; padding: 1px 8px; border-radius: 3px; background: #eef1f4; color: var(--muted); }
  .tag.hit { background: var(--ok-soft); color: var(--ok); font-weight: 600; }
  .safety { margin-top: 9px; font-size: 12px; color: var(--warn); background: var(--warn-soft); border-radius: 5px; padding: 5px 9px; }
  .puse { font-size: 12.5px; color: var(--muted); margin-top: 8px; }

  /* ---------- compare ---------- */
  .tablewrap { overflow-x: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
  table { border-collapse: collapse; width: 100%; font-size: 13.5px; min-width: 560px; }
  th, td { padding: 9px 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
  th { font-size: 11.5px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
  td.k { color: var(--muted); white-space: nowrap; width: 170px; }
  td .num { font-family: var(--mono); font-size: 12.5px; font-variant-numeric: tabular-nums; }
  .rm { font-size: 12px; color: var(--ember); background: none; border: 0; padding: 0; margin-top: 4px; }

  /* ---------- detail drawer ---------- */
  .drawer {
    position: fixed; inset: 0 0 0 auto; width: min(430px, 92vw);
    background: var(--panel); border-left: 1px solid var(--line);
    box-shadow: -12px 0 30px rgba(20,30,42,0.12);
    transform: translateX(105%); transition: transform 0.22s ease;
    padding: 26px 26px 40px; overflow-y: auto; z-index: 30;
  }
  @media (prefers-reduced-motion: reduce) { .drawer { transition: none; } }
  .drawer.open { transform: none; }
  .drawer .close { position: absolute; top: 14px; right: 14px; border: 0; background: #eef1f4; border-radius: 6px; width: 30px; height: 30px; font-size: 15px; color: var(--muted); }
  .drawer h2 { margin: 0 0 2px; font-size: 18px; }
  .drawer .pfam { margin-bottom: 14px; }
  .kv { font-size: 13.5px; }
  .kv div { display: flex; justify-content: space-between; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .kv span:first-child { color: var(--muted); }
  .kv b { font-family: var(--mono); font-weight: 600; font-size: 12.5px; text-align: right; }
  .drawer h4 { font-size: 11.5px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin: 18px 0 8px; }
  .scrim { position: fixed; inset: 0; background: rgba(20,30,42,0.28); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 25; }
  .scrim.open { opacity: 1; pointer-events: auto; }

  /* ---------- powder library (category accordion) ---------- */
  .pcat {
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); font-weight: 650; margin: 28px 0 8px;
    display: flex; align-items: baseline; gap: 10px;
  }
  .pcat::after { content: ""; flex: 1; border-bottom: 1px solid var(--line); }
  .pcat small { font-family: var(--mono); font-size: 11px; color: var(--faint); letter-spacing: 0; text-transform: none; }
  .prow {
    display: grid; grid-template-columns: 150px 1fr auto auto 16px;
    gap: 4px 14px; align-items: baseline;
    width: 100%; text-align: left; font: inherit; color: var(--ink);
    background: var(--panel); border: 1px solid var(--line); border-radius: 6px;
    padding: 11px 16px; margin-bottom: 6px; cursor: pointer;
  }
  .prow:hover { border-color: var(--ember); }
  .prow:focus-visible { outline: 2px solid var(--ember); outline-offset: 1px; }
  .prow.open { border-color: var(--ember); background: var(--ember-soft); border-radius: 6px 6px 0 0; margin-bottom: 0; }
  .prow-name { font-weight: 650; font-size: 14.5px; }
  .prow-fam { color: var(--muted); font-size: 13px; }
  .prow-mkt { font-family: var(--mono); font-size: 12px; color: var(--ember); white-space: nowrap; }
  .prow-count { font-size: 12px; color: var(--faint); white-space: nowrap; }
  .chev { color: var(--faint); justify-self: end; }
  .pdetail { margin: 0 0 14px; }
  .pdetail .powderhead { margin-top: 0; border-radius: 0; }
  @media (max-width: 860px) {
    .prow { grid-template-columns: 1fr auto 14px; }
    .prow-fam, .prow-mkt { display: none; }
  }

  /* ---------- supplier search ---------- */
  .searchrow { display: flex; gap: 10px; margin-bottom: 16px; max-width: 520px; }
  .searchrow input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--line); border-radius: 6px;
    font: inherit; font-size: 15px; background: var(--panel); color: var(--ink);
  }
  .searchrow input:focus-visible { outline: 2px solid var(--ember); outline-offset: 1px; }
  .quickchips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .qchip { border: 1px solid var(--line); background: var(--panel); border-radius: 20px; padding: 5px 14px; font-size: 13px; color: var(--ink); }
  .qchip:hover { border-color: var(--ember); color: var(--ember); }
  .powderhead {
    background: var(--panel); border: 1px solid var(--line); border-bottom: 0;
    border-radius: 8px 8px 0 0; padding: 13px 18px 11px;
    display: flex; flex-wrap: wrap; gap: 4px 22px; align-items: baseline; margin-top: 22px;
  }
  .powderhead b { font-size: 16px; }
  .powderhead .mkt { font-size: 13px; color: var(--muted); }
  .powderhead .mkt em { color: var(--ember); font-style: normal; font-weight: 600; font-family: var(--mono); font-size: 12.5px; }
  .availpill { font-size: 10.5px; padding: 2px 8px; border-radius: 3px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 650; white-space: nowrap; }
  .availpill.list { background: var(--ok-soft); color: var(--ok); }
  .availpill.store { background: var(--ember-soft); color: var(--ember); }
  .availpill.quote { background: #eef1f4; color: var(--muted); }
  .suptable a { color: var(--ember); font-weight: 600; text-decoration: none; white-space: nowrap; }
  .suptable a:hover, .suptable a:focus-visible { text-decoration: underline; }
  .pricelb { font-family: var(--mono); font-weight: 700; font-size: 13px; white-space: nowrap; }
  .pricelb small { display: block; font-weight: 400; color: var(--faint); font-size: 11px; }
  .datanote { font-size: 12.5px; color: var(--muted); margin-top: 16px; max-width: 80ch; }

  .filterbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
  .filterbar select { padding: 7px 9px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); font: inherit; }
  .filterbar .hint { color: var(--faint); font-size: 12.5px; }

  @media (max-width: 780px) {
    body { grid-template-columns: 1fr; }
    nav { position: static; height: auto; flex-direction: row; flex-wrap: wrap; align-items: center; padding: 10px 12px; }
    .logo { padding: 0 8px 0 0; } .logo small { display: none; }
    .nav-item { width: auto; }
    .nav-foot { display: none; }
    main { padding: 18px 16px 60px; }
    .mcard { grid-template-columns: 1fr; }
    .rank { display: none; }
    .mside { flex-direction: row; align-items: center; justify-content: space-between; width: 100%; }
  }
</style>

    Compare <span class="badge" id="cmpBadge" hidden>0</span>
  </button>
  <div class="nav-foot">Sample dataset for prototype purposes. Supplier list prices collected July 2026 — verify before purchase.</div>
</nav>

  { id:"m4004", name:"M 400-4", maker:"EOS", cls:"Production", build:[400,400,400], nLasers:4, power:400, layer:"30–90 µm", price:1500,

/* ============================ logic ============================ */
function matchedPowders() {
  return POWDERS.filter(p => {
    const reqOk = [...S.reqs].every(r => p.tags.includes(r));
    const appOk = !S.app || p.apps.includes(S.app);
    return reqOk && (S.reqs.size ? true : appOk);
  });
}

function rankMachines() {
  const ids = matchedPowders().map(p => p.id);
  return PRINTERS
    .filter(m => m.price <= S.budget && Math.min(...m.build) >= S.size)
    .map(m => {
      const covered = ids.filter(id => m.validated.includes(id));
      const coverage = ids.length ? covered.length / ids.length : 1;
      const appFit = !S.app ? 0.7 : (m.apps.includes(S.app) ? 1 : 0.25);
      const headroom = 1 - Math.min(m.price / (S.budget === 9999 ? 2000 : S.budget), 1);
      return { m, score: 0.5 * coverage + 0.3 * appFit + 0.2 * headroom, covered, powderIds: ids };
    })
    .sort((a, b) => b.score - a.score);
}

const fmtPrice = k => k >= 1000 ? "$" + (k / 1000).toFixed(1).replace(".0", "") + " M" : "$" + k + " k";
const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;");

}

/* ---------- guided selector ---------- */

    return `<button class="step ${cls}" data-step="${n}" ${n > S.step && !S.results ? "" : ""}>

  }).join("");

  let body = "";

      <div class="wizfoot">
        <button class="btn" data-back>Back</button>
        <button class="btn primary" data-next>Continue</button>
      </div>`;
  } else {
    body = `<div class="formgrid">
      <div class="field"><label>Largest part dimension</label>
        <select id="fSize">
          <option value="80" ${S.size===80?"selected":""}>Small — fits in 80 mm</option>
          <option value="230" ${S.size===230?"selected":""}>Medium — up to 230 mm</option>
          <option value="380" ${S.size===380?"selected":""}>Large — up to 380 mm</option>
        </select></div>
      <div class="field"><label>Machine budget</label>
        <select id="fBudget">
          <option value="200" ${S.budget===200?"selected":""}>Under $200 k</option>
          <option value="500" ${S.budget===500?"selected":""}>Under $500 k</option>
          <option value="1000" ${S.budget===1000?"selected":""}>Under $1 M</option>

        </select></div>
      </div>
      <div class="wizfoot">
        <button class="btn" data-back>Back</button>
        <button class="btn primary" data-run>Get recommendations</button>
      </div>`;
  }

  let results = "";
  if (S.results) {
    const powders = matchedPowders();
    results = `<section style="margin-top:34px">
      <h1 style="font-size:17px">Recommendations</h1>
      <p class="sub">${S.results.length} machine${S.results.length===1?"":"s"} pass your constraints · ${powders.length} matching powder${powders.length===1?"":"s"}: ${powders.map(p=>p.name).join(", ") || "none"}</p>`
      + (S.results.length ? S.results.map((r, i) => machineCard(r.m, i + 1, r)).join("")
        : `<div class="empty">Nothing passes the budget and part-size filters together. Try a higher budget tier or a smaller part.</div>`)
      + `</section>`;
  }

  main.innerHTML = `
    <div class="topline"><h1>Guided selector</h1></div>
    <p class="sub">Three questions, then a ranked shortlist with validated powder coverage.</p>
    <div class="steps">${stepBtns}</div>
    ${body}${results}`;

  main.querySelectorAll("[data-step]").forEach(b => b.onclick = () => { S.step = +b.dataset.step; render(); });
  main.querySelectorAll("[data-app]").forEach(b => b.onclick = () => { S.app = b.dataset.app; render(); });
  main.querySelectorAll("[data-req]").forEach(b => b.onclick = () => {
    S.reqs.has(b.dataset.req) ? S.reqs.delete(b.dataset.req) : S.reqs.add(b.dataset.req); render();
  });
  const skip = main.querySelector("[data-skipapp]");
  if (skip) skip.onclick = () => { S.app = null; S.step = 2; render(); };
  const next = main.querySelector("[data-next]");
  if (next) next.onclick = () => { S.step++; render(); };
  const back = main.querySelector("[data-back]");
  if (back) back.onclick = () => { S.step--; render(); };
  const run = main.querySelector("[data-run]");
  if (run) run.onclick = () => {
    S.size = +document.getElementById("fSize").value;
    S.budget = +document.getElementById("fBudget").value;
    S.results = rankMachines();
    render();
    main.querySelector("section")?.scrollIntoView({ behavior: "smooth", block: "start" });

  wireCards();
}

function machineCard(m, rank, r) {

}

function wireCards() {
  main.querySelectorAll("[data-cmp]").forEach(b => b.onclick = () => {

const lbNum = s => s && s.lb ? parseFloat(s.lb.replace(/[^0-9.]/g, "")) : Infinity;

function supplierBlock(p, withInfo) {
  // Priced suppliers first (lowest $/lb first), then the rest alphabetically.
  const rows = SUPPLIERS.filter(s => s.pw === p.id).slice().sort((a, b) => {
    if (a.lb && b.lb) return lbNum(a) - lbNum(b) || a.sup.localeCompare(b.sup);
    if (a.lb !== b.lb && (a.lb || b.lb)) return a.lb ? -1 : 1;
    return a.sup.localeCompare(b.sup);
  });
  const AVAIL = { list: "List price", store: "Online store", quote: "RFQ" };
  const info = !withInfo ? "" : `
    <div class="powderhead" style="margin-top:0;border-radius:0;border-top:1px dashed var(--line)">

      ${p.reactive ? `<span class="mkt" style="color:var(--warn)">⚠ Reactive — inert handling, argon sieving</span>` : ""}
    </div>`;
  return `
    <div class="powderhead">
      <b>${p.name}</b>
      <span class="mkt">${p.fam}</span>
      <span class="mkt">Typical US market: <em>${MKT[p.id]}</em></span>
      <button class="mini" data-rfq="${p.id}" style="margin-left:auto">Request quote →</button>
    </div>${info}
    <div class="tablewrap" style="border-radius:0 0 8px 8px"><table class="suptable">
      <tr><th>Supplier</th><th>Product / PSD</th><th>List price</th><th>Pricing</th><th>Package</th><th>Website</th></tr>
      ${rows.map(s => `<tr>
        <td><span style="font-weight:600" title="${s.loc}">${s.sup}</span>${s.note ? `<br><span style="font-size:12px;color:var(--muted)">${s.note}</span>` : ""}</td>
        <td>${s.prod}<br><span class="num" style="color:var(--muted);font-size:12px">${s.psd}</span></td>
        <td>${s.lb ? `<span class="pricelb">${s.lb}/lb<small>${s.kg}/kg</small></span>` : `<span style="color:var(--faint)">—</span>`}</td>
        <td><span class="availpill ${s.avail}">${AVAIL[s.avail]}</span></td>
        <td style="white-space:nowrap">${s.pack}</td>
        <td><a href="${s.url}" target="_blank" rel="noopener">Visit ↗</a></td>
      </tr>`).join("")}
    </table></div>`;
}

    </div>` : ""}
    <div class="formgrid" style="margin-top:14px">
      <div class="field"><label>Your name</label><input id="rName" type="text" value="${escA(r.name)}" placeholder="Jane Doe"></div>
      <div class="field"><label>Organization</label><input id="rOrg" type="text" value="${escA(r.org)}" placeholder="University / company"></div>
      <div class="field"><label>Email</label><input id="rEmail" type="email" value="${escA(r.email)}" placeholder="you@example.edu"></div>
    </div>
    <div class="field" style="margin-top:14px;max-width:640px"><label>Application / notes (optional)</label>
      <textarea id="rNotes" rows="2" placeholder="e.g. LPBF research on an EOS M 290; CoA required per batch">${esc(r.notes)}</textarea></div>
    <div class="wizfoot"><button class="btn primary" id="rGen">${r.generated ? "Regenerate request" : "Generate request"}</button></div>
    ${r.generated ? `
    <section style="margin-top:28px">
      <h2 style="font-size:16px;margin:0 0 8px">Your request</h2>
      <textarea id="rOut" class="rfqbox" readonly>${esc(composed)}</textarea>
      <div class="wizfoot" style="margin-top:10px">
        <button class="btn primary" id="rCopy">Copy to clipboard</button>
        <a class="btn" style="text-decoration:none" href="mailto:info@easifyadditive.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(composed)}">Email Easify Additive directly</a>
      </div>
      <div class="wizfoot" style="margin-top:18px">
        <button class="btn primary" id="rPost">${r.postedId ? "Posted ✓ — post again" : "Post to request board"}</button>
        ${r.postedId ? `<span class="sub" style="align-self:center;margin:0">Suppliers can now see it in the Supplier portal and leave feedback.</span>` : ""}
      </div>
      <h2 style="font-size:16px;margin:26px 0 4px">${isCustom ? "Custom-powder producers to contact" : `Send it to these ${powderName} suppliers`}</h2>
      <p class="sub" style="margin-bottom:10px">${isCustom ? "These companies atomize made-to-order alloys — paste the request into their contact forms." : `${sups.length} suppliers carry this alloy — paste the request into each contact form. Suppliers with published prices are listed first.`}</p>
      <div class="tablewrap"><table class="suptable">
        <tr><th>Supplier</th><th>${isCustom ? "Capability" : "List price"}</th><th>Website</th></tr>
        ${isCustom
          ? CUSTOM_SUPS.map(([sup, cap, url]) => `<tr>
            <td><span style="font-weight:600">${sup}</span></td>
            <td>${cap}</td>
            <td><a href="${url}" target="_blank" rel="noopener">Visit ↗</a></td>
          </tr>`).join("")
          : sups.map(s => `<tr>
            <td><span style="font-weight:600" title="${escA(s.loc)}">${s.sup}</span></td>
            <td>${s.lb ? `<span class="pricelb">${s.lb}/lb</span>` : `<span style="color:var(--faint)">RFQ</span>`}</td>
            <td><a href="${s.url}" target="_blank" rel="noopener">Visit ↗</a></td>
          </tr>`).join("")}
      </table></div>
      <p class="datanote">This prototype composes the request locally and stores posted requests in this browser only — nothing is transmitted. A production version would use a backend so requests reach suppliers and feedback flows back automatically.</p>
    </section>` : ""}
    ${myReqsHtml()}`;

  const bind = (id, key) => { const el = document.getElementById(id); el.oninput = () => { S.rfq[key] = el.value; }; };
  bind("rQty", "qty"); bind("rName", "name"); bind("rOrg", "org"); bind("rEmail", "email"); bind("rNotes", "notes");
  document.getElementById("rPw").onchange = e => { S.rfq.pw = e.target.value; render(); };
  const cn = document.getElementById("rCname"); if (cn) cn.oninput = () => { S.rfq.customName = cn.value; };
  const cs = document.getElementById("rCspec"); if (cs) cs.oninput = () => { S.rfq.customSpec = cs.value; };
  document.getElementById("rPsd").onchange = e => { S.rfq.psd = e.target.value; if (S.rfq.generated) render(); };
  document.getElementById("rGen").onclick = () => { S.rfq.generated = true; render(); };
  const cp = document.getElementById("rCopy");
  if (cp) cp.onclick = () => {
    const out = document.getElementById("rOut");
    out.select();
    const done = () => { cp.textContent = "Copied ✓"; setTimeout(() => { cp.textContent = "Copy to clipboard"; }, 1500); };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(out.value).then(done, done);
    else { document.execCommand && document.execCommand("copy"); done(); }
  };
  const post = document.getElementById("rPost");
  if (post) post.onclick = () => {
    const reqs = loadReqs();
    const id = "req_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    reqs.push({ id, ts: Date.now(), powder: powderName, spec: powderFam, custom: isCustom,
      qty: r.qty, psd: r.psd, name: r.name, org: r.org, email: r.email, notes: r.notes, responses: [] });
    saveReqs(reqs);
    S.rfq.postedId = id;
    render();
  };
}

/* Requests posted to the board, with supplier feedback (shown on the Send request page). */
function myReqsHtml() {
  const reqs = loadReqs().slice().sort((a, b) => b.ts - a.ts);
  if (!reqs.length) return "";
  return `<section style="margin-top:36px">
    <h2 style="font-size:16px;margin:0 0 4px">Posted requests & supplier feedback</h2>
    <p class="sub" style="margin-bottom:10px">${reqs.length} request${reqs.length === 1 ? "" : "s"} on the board. Supplier feedback appears here as it arrives.</p>
    ${reqs.map(q => `
      <div class="powderhead"><b>${esc(q.powder)}</b>
        <span class="mkt">${esc(q.qty)} kg · ${esc(q.psd)}${q.custom ? " · custom alloy" : ""}</span>
        <span class="mkt">${esc(q.name || "anonymous")}${q.org ? " · " + esc(q.org) : ""}</span>
        <span class="mkt">${fmtTs(q.ts)}</span>
        <span class="availpill ${q.responses.length ? "list" : "quote"}" style="margin-left:auto">${q.responses.length} feedback</span>
      </div>
      <div class="tablewrap" style="border-radius:0 0 8px 8px;margin-bottom:14px"><table class="suptable">
        ${q.responses.length ? `<tr><th>Supplier</th><th>Quoted price</th><th>Lead time</th><th>Message</th><th>Date</th></tr>` +
          q.responses.map(x => `<tr>
            <td style="font-weight:600">${esc(x.sup)}</td>
            <td>${x.price ? `<span class="pricelb">${esc(x.price)}</span>` : "—"}</td>
            <td>${esc(x.lead || "—")}</td>
            <td>${esc(x.msg || "—")}</td>
            <td style="white-space:nowrap;color:var(--muted)">${fmtTs(x.ts)}</td>
          </tr>`).join("")
        : `<tr><td style="color:var(--muted)">No supplier feedback yet — check back later.</td></tr>`}
      </table></div>`).join("")}
  </section>`;
}

/* ---------- supplier portal ---------- */
function vPortal() {
  const reqs = loadReqs().slice().sort((a, b) => b.ts - a.ts);
  main.innerHTML = `
    <div class="topline"><h1>Supplier portal</h1></div>
    <p class="sub">Open customer requests. Suppliers: review a request and submit feedback — quoted price, lead time, and a short message. The customer sees it on the “Send request” page.</p>
    ${reqs.length ? reqs.map(q => `
      <div class="powderhead"><b>${esc(q.powder)}</b>
        <span class="mkt">${esc(q.qty)} kg · ${esc(q.psd)}${q.custom ? " · custom alloy" : ""}</span>
        <span class="mkt">${fmtTs(q.ts)}</span>
        <span class="availpill ${q.responses.length ? "list" : "quote"}" style="margin-left:auto">${q.responses.length} feedback</span>
      </div>
      <div class="powderhead" style="margin-top:0;border-radius:0;border-top:1px dashed var(--line)">
        <span class="mkt">From <em>${esc(q.name || "anonymous")}${q.org ? " · " + esc(q.org) : ""}</em></span>
        ${q.email ? `<span class="mkt">Contact <em>${esc(q.email)}</em></span>` : ""}
        ${q.spec ? `<span class="mkt">Spec <em>${esc(q.spec)}</em></span>` : ""}
        ${q.notes ? `<span class="mkt" style="flex:1;min-width:220px">${esc(q.notes)}</span>` : ""}
      </div>
      <div class="tablewrap" style="border-radius:0"><table class="suptable">
        ${q.responses.length ? `<tr><th>Supplier</th><th>Quoted price</th><th>Lead time</th><th>Message</th><th>Date</th></tr>` +
          q.responses.map(x => `<tr>
            <td style="font-weight:600">${esc(x.sup)}</td>
            <td>${x.price ? `<span class="pricelb">${esc(x.price)}</span>` : "—"}</td>
            <td>${esc(x.lead || "—")}</td>
            <td>${esc(x.msg || "—")}</td>
            <td style="white-space:nowrap;color:var(--muted)">${fmtTs(x.ts)}</td>
          </tr>`).join("") : `<tr><td style="color:var(--muted)">No feedback yet — be the first to respond.</td></tr>`}
      </table></div>
      <div class="powderhead" style="margin-top:0;border-radius:0 0 8px 8px;border:1px solid var(--line);border-top:1px dashed var(--line);margin-bottom:18px;gap:10px;align-items:end">
        <div class="field" style="flex:1;min-width:150px"><label>Your company</label><input data-f="sup" data-id="${q.id}" type="text" placeholder="Supplier name"></div>
        <div class="field" style="width:130px"><label>Price</label><input data-f="price" data-id="${q.id}" type="text" placeholder="$65/kg"></div>
        <div class="field" style="width:130px"><label>Lead time</label><input data-f="lead" data-id="${q.id}" type="text" placeholder="3 weeks"></div>
        <div class="field" style="flex:2;min-width:200px"><label>Message</label><input data-f="msg" data-id="${q.id}" type="text" placeholder="In stock; CoA included with every batch"></div>
        <button class="btn primary" data-resp="${q.id}">Submit feedback</button>
      </div>`).join("")
    : `<div class="empty">No requests yet. Customers post requests from the “Send request” page — they will appear here.</div>`}
    <p class="datanote">Prototype: requests and feedback are stored in this browser’s local storage so the full loop can be demonstrated. A production version needs a backend with supplier accounts, notifications, and email delivery.</p>`;

  main.querySelectorAll("[data-resp]").forEach(b => b.onclick = () => {
    const id = b.dataset.resp;
    const val = f => { const el = main.querySelector(`[data-f="${f}"][data-id="${id}"]`); return el ? el.value : ""; };
    if (!val("sup").trim()) { b.textContent = "Enter company name"; setTimeout(() => { b.textContent = "Submit feedback"; }, 1400); return; }
    const reqs2 = loadReqs();
    const q = reqs2.find(x => x.id === id);
    if (q) {
      q.responses.push({ sup: val("sup").trim(), price: val("price").trim(), lead: val("lead").trim(), msg: val("msg").trim(), ts: Date.now() });
      saveReqs(reqs2);
      render();
    }
  });
}

/* ---------- company directory ---------- */
function vCompanies() {
  const groups = [...new Set(COMPANIES.map(c => c.group))];
  main.innerHTML = `
    <div class="topline"><h1>Company directory</h1></div>
    <p class="sub">${COMPANIES.length} companies selling metal powder for additive manufacturing — US producers first, then international producers, machine OEMs, and web stores. “Public list” means prices are published online; “RFQ” means quote per order.</p>
    ` + groups.map(g => {
      const rows = COMPANIES.filter(c => c.group === g);
      return `<h2 class="pcat">${g} <small>${rows.length} companies</small></h2>
      <div class="tablewrap"><table class="suptable">
        <tr><th>Company</th><th>HQ / US presence</th><th>Materials focus</th><th>Pricing</th><th>Website</th></tr>
        ${rows.map(c => `<tr>
          <td style="white-space:nowrap;font-weight:600">${c.name}</td>
          <td>${c.hq}</td>
          <td>${c.mats}</td>
          <td><span class="availpill ${c.list ? "list" : "quote"}">${c.pricing}</span></td>
          <td><a href="${c.url}" target="_blank" rel="noopener">Visit ↗</a></td>
        </tr>`).join("")}
      </table></div>`;
    }).join("") + `
    <p class="datanote">Compiled July 2026 from web research; every website was verified to resolve. Companies marked “Public list” publish prices online — their prices feed the Powder library tables. The AM powder market also has additional regional producers (especially in China); this directory covers the companies most relevant to US buyers.</p>`;
}

/* ---------- compare ---------- */
function vCompare() {
  const sel = PRINTERS.filter(m => S.compare.has(m.id));
  if (!sel.length) {
    main.innerHTML = `
      <div class="topline"><h1>Compare machines</h1></div>
      <p class="sub">Nothing selected yet. Add up to three machines from the selector or the database using the “+ Compare” button.</p>
      <div class="empty">Your comparison list is empty.</div>`;
    return;
  }
  const rows = [
    ["Manufacturer", m => m.maker],
    ["Class", m => m.cls],
    ["Build volume", m => `<span class="num">${m.build.join(" × ")} mm</span>`],
    ["Lasers", m => `<span class="num">${m.nLasers} × ${m.power} W</span>`],
    ["Layer thickness", m => `<span class="num">${m.layer}</span>`],
    ["Indicative price", m => `<span class="num">${fmtPrice(m.price)}</span>`],
    ["Validated powders", m => m.validated.map(id => POWDERS.find(p => p.id === id).name).join(", ")],
    ["Best suited to", m => m.apps.map(a => APPS.find(x => x.id === a)?.label).filter(Boolean).join(", ")],
    ["Notes", m => m.notes],
  ];
  main.innerHTML = `
    <div class="topline"><h1>Compare machines</h1></div>
    <p class="sub">${sel.length} of 3 slots used.</p>
    <div class="tablewrap"><table>
      <tr><th></th>${sel.map(m => `<th>${m.name}<br><span style="text-transform:none;letter-spacing:0;font-weight:400">${m.maker}</span><br>
        <button class="rm" data-rm="${m.id}">remove</button></th>`).join("")}</tr>
      ${rows.map(([k, fn]) => `<tr><td class="k">${k}</td>${sel.map(m => `<td>${fn(m)}</td>`).join("")}</tr>`).join("")}
    </table></div>`;
  main.querySelectorAll("[data-rm]").forEach(b => b.onclick = () => { S.compare.delete(b.dataset.rm); render(); });
}

/* ---------- detail drawer ---------- */
const drawer = document.getElementById("drawer");
const scrim = document.getElementById("scrim");
function openDrawer(id) {
  const m = PRINTERS.find(x => x.id === id);
  drawer.innerHTML = `
    <button class="close" aria-label="Close">✕</button>
    <h2>${m.name}</h2>
    <div class="pfam">${m.maker} · ${m.cls}-class LPBF system</div>
    <div class="kv">
      <div><span>Build volume</span><b>${m.build.join(" × ")} mm</b></div>
      <div><span>Laser configuration</span><b>${m.nLasers} × ${m.power} W Yb-fiber</b></div>
      <div><span>Layer thickness</span><b>${m.layer}</b></div>
      <div><span>Indicative price</span><b>${fmtPrice(m.price)}</b></div>
    </div>
    <h4>Validated powders (${m.validated.length})</h4>
    <div class="tagrow">${m.validated.map(id2 => `<span class="chip">${POWDERS.find(p => p.id === id2).name}</span>`).join("")}</div>
    <h4>Typical applications</h4>
    <div>${m.apps.map(a => APPS.find(x => x.id === a)?.label).filter(Boolean).join(" · ")}</div>
    <h4>Notes</h4>
    <div style="font-size:13.5px;color:var(--muted)">${m.notes}</div>`;
  drawer.classList.add("open");
  scrim.classList.add("open");
  drawer.querySelector(".close").onclick = closeDrawer;
  drawer.querySelector(".close").focus();
}
function closeDrawer() { drawer.classList.remove("open"); scrim.classList.remove("open"); }
scrim.onclick = closeDrawer;
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDrawer(); });

/* ---------- nav ---------- */
document.querySelectorAll(".nav-item").forEach(b =>
  b.onclick = () => { S.view = b.dataset.view; render(); });

render();
</script>
